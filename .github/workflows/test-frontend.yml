name: Frontend tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Install dependencies
      working-directory: ${{ github.workspace }}/frontend
      run: |
        npm install
        npx playwright install

    - name: Test Frontend
      working-directory: ${{ github.workspace }}/frontend
      run: |
        npm run test
